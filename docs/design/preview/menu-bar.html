<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 200px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div class="label" style="margin-bottom:14px;">Menu bar · status item + dropdown</div>
<div style="display:flex;gap:24px;align-items:flex-start;">
  <div style="display:flex;align-items:center;gap:14px;padding:6px 12px;background:#1F2937;border-radius:6px;">
    <img src="../brand/icons/menubar.svg" style="width:16px;height:16px;filter:invert(1);" alt="menu bar">
    <span style="color:#fff;font-size:11px;opacity:0.7;">⌃ ⌥ ⌘ Q</span>
  </div>
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:6px;width:200px;box-shadow:0 6px 20px rgba(0,0,0,0.12);font-size:13px;">
    <div style="padding:6px 10px;border-radius:4px;">About Locto</div>
    <div style="padding:6px 10px;border-radius:4px;background:var(--brand);color:#fff;">Pause Coaching</div>
    <div style="padding:6px 10px;border-radius:4px;">Check Permissions</div>
    <div style="height:0;border-top:0.5px solid var(--border);margin:4px 0;"></div>
    <div style="padding:6px 10px;border-radius:4px;display:flex;justify-content:space-between;color:var(--text-secondary);"><span>Settings…</span><span class="mono">⌘,</span></div>
    <div style="padding:6px 10px;border-radius:4px;display:flex;justify-content:space-between;color:var(--text-secondary);"><span>Quit Locto</span><span class="mono">⌘Q</span></div>
  </div>
</div>
</div></body></html>
