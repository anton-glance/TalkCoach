<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 200px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div style="display:grid;grid-template-columns:120px 1fr;gap:20px;align-items:baseline;padding-bottom:12px;border-bottom:0.5px solid var(--border);">
  <div class="mono" style="line-height:1.6;"><div class="label" style="color:var(--text-primary);margin-bottom:4px;">Heading 2</div>24px · w 500</div>
  <div style="font-size:22px;font-weight:500;letter-spacing:-0.6px;line-height:1.2;">Pace was on point</div>
</div>
<div style="display:grid;grid-template-columns:120px 1fr;gap:20px;align-items:baseline;padding:12px 0;border-bottom:0.5px solid var(--border);">
  <div class="mono" style="line-height:1.6;"><div class="label" style="color:var(--text-primary);margin-bottom:4px;">Body</div>15px · w 400</div>
  <div style="font-size:15px;line-height:1.6;color:var(--text-primary);">You held 161 wpm across 22 minutes — right in the comprehension sweet spot.</div>
</div>
<div style="display:grid;grid-template-columns:120px 1fr;gap:20px;align-items:baseline;padding-top:12px;">
  <div class="mono" style="line-height:1.6;"><div class="label" style="color:var(--text-primary);margin-bottom:4px;">Caption</div>13px · sec</div>
  <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;">2 of 100 spoken · longest solo run 7.5 min</div>
</div>
</div></body></html>
