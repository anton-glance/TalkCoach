<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 170px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div class="label" style="margin-bottom:18px;">Shadows · only the floating widget. No card shadows.</div>
<div style="display:flex;gap:24px;align-items:center;padding:20px 14px;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div style="width:90px;height:90px;border-radius:24px;background:linear-gradient(160deg,#C0D5C5,#B0CDB6);box-shadow:0 8px 28px rgba(0,0,0,0.18);"></div>
    <div class="mono" style="text-align:center;line-height:1.5;"><div style="color:var(--text-primary);font-family:var(--font-sans);font-size:11px;font-weight:500;">Resting</div>0 8 28 / .18</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div style="width:90px;height:90px;border-radius:24px;background:linear-gradient(160deg,#C0D5C5,#B0CDB6);box-shadow:0 14px 42px rgba(0,0,0,0.26);transform:translateY(-3px) scale(1.025);"></div>
    <div class="mono" style="text-align:center;line-height:1.5;"><div style="color:var(--text-primary);font-family:var(--font-sans);font-size:11px;font-weight:500;">Hover</div>0 14 42 / .26</div>
  </div>
  <div style="flex:1;font-size:13px;color:var(--text-secondary);line-height:1.6;">Hover transform: <span class="mono">scale 1.025</span>, <span class="mono">translateY -3pt</span>, tint α 0.42 → 0.62, border α 0.55 → 0.78. Duration 280ms easeOut.</div>
</div>
</div></body></html>
