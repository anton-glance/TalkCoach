<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 170px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div class="grid" style="grid-template-columns:repeat(7,1fr);gap:6px;">
  <div style="height:104px;background:#E1F5EE;color:#04342C;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">50</div>
    <div>#E1F5EE</div></div><div style="height:104px;background:#9FE1CB;color:#04342C;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">100</div>
    <div>#9FE1CB</div></div><div style="height:104px;background:#5DCAA5;color:#04342C;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">200</div>
    <div>#5DCAA5</div></div><div style="height:104px;background:#1D9E75;color:#fff;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">400</div>
    <div>#1D9E75</div></div><div style="height:104px;background:#0F6E56;color:#fff;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">600</div>
    <div>#0F6E56</div></div><div style="height:104px;background:#085041;color:#5DCAA5;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">800</div>
    <div>#085041</div></div><div style="height:104px;background:#04342C;color:#5DCAA5;border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:10px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:0;">900</div>
    <div>#04342C</div></div>
</div>
<div class="mono" style="margin-top:10px;">Teal · brand only. Never used to imply pace state.</div>
</div></body></html>
