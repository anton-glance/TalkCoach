<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 180px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div style="display:flex;align-items:center;gap:40px;">
  <img src="../brand/icons/app-icon.svg" style="width:112px;height:112px;border-radius:25px;" alt="app icon">
  <div style="display:flex;align-items:center;gap:14px;padding:8px 14px;background:var(--surface-2);border-radius:6px;border:0.5px solid var(--border);">
    <img src="../brand/icons/menubar.svg" style="width:18px;height:18px;" alt="menu bar">
    <span class="mono">22 × 22 template · @1x @2x @3x</span>
  </div>
  <div style="flex:1;">
    <div class="label" style="margin-bottom:6px;">App icon &amp; menu bar</div>
    <div class="mono" style="line-height:1.7;">1024 × 1024 squircle · r 229px<br>fill #0F6E56 · mark in white</div>
  </div>
</div>
</div></body></html>
