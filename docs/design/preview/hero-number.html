<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 180px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div class="label" style="margin-bottom:8px;">Hero number block</div>
<div style="background:var(--surface-2);border-radius:14px;padding:28px 32px;display:flex;align-items:baseline;gap:20px;">
  <div style="font-size:72px;font-weight:300;letter-spacing:-2.5px;line-height:1;font-variant-numeric:tabular-nums;color:var(--text-primary);">161<span style="font-size:18px;font-weight:400;color:var(--text-tertiary);letter-spacing:0;margin-left:4px;">wpm</span></div>
  <div style="font-size:13px;color:var(--text-secondary);">pace · in ideal range</div>
</div>
<div class="mono" style="margin-top:10px;">Signature treatment for any single primary metric. Unit at 22px tertiary.</div>
</div></body></html>
