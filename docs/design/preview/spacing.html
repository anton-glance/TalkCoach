<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html, body { background: transparent; margin: 0; }
  .card {
    width: 700px;
    min-height: 170px;
    padding: 24px 28px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    box-sizing: border-box;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grid { display: grid; gap: 8px; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 0; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
</style></head><body><div class="card">

<div class="label" style="margin-bottom:14px;">4 pt base unit · multiples of 4 only</div>
<div style="display:flex;align-items:flex-end;gap:12px;height:80px;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:4px;height:4px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">4</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:8px;height:8px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">8</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:12px;height:12px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">12</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:16px;height:16px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">16</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:20px;height:20px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">20</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:24px;height:24px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">24</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:32px;height:32px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">32</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:48px;height:48px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">48</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:64px;height:64px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">64</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:80px;height:80px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">80</div></div><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:96px;height:96px;background:var(--brand);border-radius:2px;opacity:0.85;"></div><div class="mono" style="font-size:10px;">96</div></div>
</div>
<div class="mono" style="margin-top:14px;">Vertical rhythm: 12pt between siblings, 24pt between sections.</div>
</div></body></html>
